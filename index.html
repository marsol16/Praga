<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praga 2025 - Fotorelacja</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #2f2420;
            --text-main: #ebe7df;
            --accent-sand: #ebe7df;
            --transition-smooth: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            line-height: 1.7;
            overflow-x: hidden;
        }

        h1, h2, h3 { font-family: 'Playfair Display', serif; font-weight: 400; }

        section { padding: 60px 0; }

        .container { max-width: 1400px; margin: 0 auto; padding: 0 40px; }

        .img-container {
            overflow: hidden;
            background-color: #3d312c;
            border-radius: 2px;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition-smooth);
            display: block;
        }

        .img-container:hover img { transform: scale(1.05); }

        /* --- HEADER (60vh) --- */
        .hero {
            height: 60vh; 
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-img-wrapper {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .hero-img-wrapper::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: #FFFFFF;
        }

        .hero h1 { font-size: clamp(2.5rem, 8vw, 5rem); margin-bottom: 10px; }

        /* --- WAŻNE MIEJSCA (GWIAZDKI) --- */
        .timeline-wrapper { position: relative; padding: 40px 0; }
        .timeline-line {
            position: absolute;
            top: 10px; left: 10%; width: 80%; height: 1px;
            background: var(--accent-sand); opacity: 0.4;
            z-index: 1;
        }

        .timeline-grid-5 {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            position: relative;
            z-index: 2;
        }

        .timeline-item { text-align: center; }
        .timeline-star {
            width: 20px; height: 20px;
            margin: 0 auto 25px;
            fill: var(--accent-sand);
            background: var(--bg-color);
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .timeline-item:hover .timeline-star { transform: rotate(180deg) scale(1.3); }

        /* --- SCROLL GALLERIES (3 ZDJĘCIA + LINK) --- */
        .scroll-wrapper {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            padding: 20px 40px;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            align-items: center;
        }

        .scroll-wrapper::-webkit-scrollbar { display: none; }

        .scroll-item {
            flex: 0 0 450px;
            height: 600px;
            scroll-snap-align: center;
        }

        .see-more-card {
            flex: 0 0 250px;
            height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            scroll-snap-align: center;
        }

        .see-more-link {
            text-decoration: none;
            color: var(--accent-sand);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            border-bottom: 1px solid transparent;
            transition: var(--transition-smooth);
            opacity: 0.6;
        }

        .see-more-link:hover {
            opacity: 1;
            border-bottom: 1px solid var(--accent-sand);
            transform: translateX(5px);
        }

        @media (max-width: 1024px) {
            .timeline-grid-5 { grid-template-columns: 1fr; gap: 40px; }
            .timeline-line { display: none; }
            .scroll-item { flex: 0 0 85%; height: 450px; }
            .hero { height: 50vh; }
        }
    </style>
</head>
<body>
