<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dzień 2 - Galeria Praga</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #2f2420;
            --text-main: #ebe7df;
            --accent: #ebe7df;
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Montserrat', sans-serif; overflow-x: hidden; }

        /* PASEK STRONA GŁÓWNA Z KRĘCĄCYMI SIĘ GWIAZDKAMI */
        .top-home-bar {
            width: 100%;
            background: rgba(0,0,0,0.3);
            padding: 15px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            border-bottom: 1px solid rgba(235, 231, 223, 0.1);
        }

        .top-home-bar a {
            color: var(--text-main);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.75rem;
            opacity: 0.9;
            transition: var(--transition);
        }

        .top-home-bar a:hover { letter-spacing: 6px; }

        .star-icon {
            width: 16px;
            height: 16px;
            fill: var(--accent);
            animation: spin-star 5s linear infinite;
        }

        @keyframes spin-star {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* HEADER 30vh */
        .sub-hero {
            height: 30vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #3d312c;
        }
        .sub-hero img {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.3;
        }
        .hero-title-group { position: relative; z-index: 2; }
        .sub-hero h1 { font-family: 'Playfair Display', serif; font-size: 3rem; margin-bottom: 5px; }
        .sub-hero .date { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 4px; opacity: 0.7; }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px 40px; }
        
        /* NAWIGACJA DNIA */
        .day-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 0;
        }

        .nav-slot { min-width: 160px; }
        .nav-slot:last-child { text-align: right; }

        .nav-btn {
            color: var(--text-main);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 2px;
            opacity: 0.6;
            transition: var(--transition);
            display: inline-block;
        }
        .nav-btn:hover { opacity: 1; color: #fff; }

        /* SIATKA ZDJĘĆ */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
        }
        .gallery-item { aspect-ratio: 1/1; overflow: hidden; cursor: pointer; background: #3d312c; border-radius: 2px; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: var(--transition); }
        .gallery-item:hover img { transform: scale(1.07); }

        /* MAŁY POWRÓT NA DOLE */
        .footer-back { text-align: center; padding: 60px 0; opacity: 0.4; }
        .footer-back a { color: var(--text-main); text-decoration: none; font-size: 0.55rem; text-transform: uppercase; letter-spacing: 2px; }

        /* LIGHTBOX */
        #lightbox {
            position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 12, 11, 0.98); display: none; align-items: center; justify-content: center;
        }
        #lightbox img { max-width: 90%; max-height: 85vh; object-fit: contain; }
        #lightbox.active { display: flex; }
    </style>
</head>
<body>

        <img id="lightbox-img" src="">

    <script>
        function openLightbox(src) {
            const lb = document.getElementById('lightbox');
            const lbImg = document.getElementById('lightbox-img');
            lbImg.src = src;
            lb.classList.add('active');
        }
